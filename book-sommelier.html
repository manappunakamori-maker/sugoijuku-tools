<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参考書ソムリエ｜すごい塾</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00b0b9;--teal-l:#e0f7f8;
  --navy:#1e3a6e;--navy-l:#e8edf5;
  --dark:#111827;--mid:#374151;--muted:#6b7280;
  --bg:#f4f6f9;--card:#fff;--bd:#e5e7eb;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

header{background:var(--navy);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.h-logo{display:flex;align-items:center;gap:10px;}
.h-icon{width:32px;height:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.h-name{font-size:14px;font-weight:900;color:#fff;}
.h-name span{color:var(--teal);}
.h-badge{font-size:10px;color:#94a3b8;letter-spacing:1px;border:1px solid rgba(255,255,255,.15);padding:3px 10px;border-radius:999px;}

main{max-width:740px;margin:0 auto;padding:28px 20px 80px;}

.steps{display:flex;align-items:center;margin-bottom:28px;}
.step{display:flex;align-items:center;gap:7px;flex:1;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--bd);color:var(--muted);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;}
.step-label{font-size:11px;color:var(--muted);font-weight:700;transition:all .3s;}
.step.active .step-num{background:var(--teal);color:#fff;}
.step.active .step-label{color:var(--teal);}
.step.done .step-num{background:var(--navy);color:#fff;}
.step.done .step-label{color:var(--navy);}
.step-line{height:2px;background:var(--bd);flex:1;margin:0 4px;transition:background .3s;}
.step-line.done{background:var(--navy);}

.hero{text-align:center;margin-bottom:28px;}
.hero-eye{display:inline-block;font-size:11px;letter-spacing:4px;color:var(--teal);font-weight:700;margin-bottom:10px;padding:4px 14px;background:var(--teal-l);border-radius:999px;}
.hero h1{font-size:clamp(22px,5vw,30px);font-weight:900;color:var(--navy);line-height:1.35;margin-bottom:8px;}
.hero p{font-size:13px;color:var(--muted);line-height:1.7;}

.q-card{background:var(--card);border-radius:16px;border:1px solid var(--bd);padding:24px 20px;margin-bottom:14px;animation:fadeup .2s ease;}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-label{font-size:11px;letter-spacing:3px;color:var(--teal);font-weight:700;margin-bottom:8px;}
.q-text{font-size:17px;font-weight:900;color:var(--navy);line-height:1.5;margin-bottom:18px;}

.subject-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:480px){.subject-grid{grid-template-columns:repeat(2,1fr);}}
button.subj-btn{all:initial;display:flex!important;flex-direction:column!important;align-items:center!important;gap:6px!important;padding:16px 8px!important;background:var(--card)!important;border:2px solid var(--bd)!important;border-radius:14px!important;cursor:pointer!important;font-family:'Noto Sans JP',sans-serif!important;font-size:13px!important;font-weight:700!important;color:var(--dark)!important;transition:all .15s!important;width:100%!important;box-sizing:border-box!important;}
button.subj-btn .s-icon{font-size:26px;}
button.subj-btn:hover{border-color:var(--teal)!important;background:var(--teal-l)!important;}

.cat-options{display:grid;grid-template-columns:1fr;gap:8px;}
button.cat-btn{all:initial;display:flex!important;align-items:center!important;gap:10px!important;padding:13px 16px!important;background:var(--card)!important;border:2px solid var(--bd)!important;border-radius:12px!important;cursor:pointer!important;font-family:'Noto Sans JP',sans-serif!important;font-size:13px!important;font-weight:700!important;color:var(--dark)!important;transition:all .15s!important;box-sizing:border-box!important;width:100%!important;}
button.cat-btn .cat-cnt{margin-left:auto!important;font-size:11px!important;color:var(--muted)!important;font-weight:400!important;}
button.cat-btn:hover{border-color:var(--teal)!important;background:var(--teal-l)!important;}

button.back-btn{all:initial;display:flex!important;align-items:center!important;gap:5px!important;color:var(--muted)!important;font-family:'Noto Sans JP',sans-serif!important;font-size:13px!important;font-weight:700!important;cursor:pointer!important;margin-bottom:16px!important;}
button.back-btn:hover{color:var(--navy)!important;}

.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.bc-item{font-size:11px;color:var(--muted);font-weight:700;}
.bc-item.cur{color:var(--teal);}
.bc-sep{font-size:10px;color:var(--bd);}

.result-header{margin-bottom:16px;}
.result-title{font-size:19px;font-weight:900;color:var(--navy);margin-bottom:4px;}
.result-sub{font-size:12px;color:var(--muted);}

.books-grid{display:grid;grid-template-columns:1fr;gap:14px;}
.book-card{background:var(--card);border-radius:16px;border:1px solid var(--bd);padding:18px;display:flex;gap:16px;align-items:flex-start;animation:fadeup .2s ease;}
.book-img-wrap{flex-shrink:0;width:70px;display:flex;align-items:center;justify-content:center;}
.book-img{width:70px;height:100px;object-fit:cover;border-radius:5px;box-shadow:2px 4px 10px rgba(0,0,0,.18);}
.book-img-ph{width:70px;height:100px;background:linear-gradient(135deg,var(--navy-l),var(--teal-l));border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.book-body{flex:1;min-width:0;}
.book-cat{display:inline-block;font-size:9px;letter-spacing:2px;font-weight:700;color:var(--teal);background:var(--teal-l);padding:2px 8px;border-radius:4px;margin-bottom:6px;}
.book-title{font-size:14px;font-weight:900;color:var(--navy);line-height:1.45;margin-bottom:8px;}
.book-review{font-size:12px;color:var(--mid);line-height:1.75;background:var(--navy-l);border-radius:8px;padding:10px 12px;border-left:3px solid var(--teal);}

button.retry-btn{all:initial;display:block!important;width:100%!important;padding:14px!important;background:transparent!important;border:2px solid var(--bd)!important;border-radius:12px!important;color:var(--muted)!important;font-family:'Noto Sans JP',sans-serif!important;font-size:14px!important;font-weight:700!important;cursor:pointer!important;text-align:center!important;margin-top:18px!important;}
button.retry-btn:hover{border-color:var(--teal)!important;color:var(--teal)!important;}

.cta-card{background:linear-gradient(135deg,var(--navy),#1a5276);border-radius:16px;padding:22px;text-align:center;margin-top:14px;}
.cta-card p{font-size:13px;color:#bae6fd;line-height:1.7;margin-bottom:12px;}
.cta-card a{display:block;background:var(--teal);color:#fff;text-decoration:none;padding:13px;border-radius:12px;font-size:15px;font-weight:900;}

.screen{display:none;}
.screen.on{display:block;}
</style>
</head>

var selSubj=null,selCat=null;

function goStep(n){
  ['scr1','scr2','scr3'].forEach(function(id,i){
    document.getElementById(id).className='screen'+(i+1===n?' on':'');
  });
  for(var i=1;i<=3;i++){
    document.getElementById('step'+i).className='step'+(i<n?' done':i===n?' active':'');
  }
  document.getElementById('line1').className='step-line'+(n>1?' done':'');
  document.getElementById('line2').className='step-line'+(n>2?' done':'');
  window.scrollTo({top:0,behavior:'smooth'});
}

(function(){
  var g=document.getElementById('subj-grid');
  Object.keys(DATA).forEach(function(s){
    var b=document.createElement('button');
    b.className='subj-btn';
    b.innerHTML='<span class="s-icon">'+DATA[s].icon+'</span><span>'+s+'</span>';
    b.onclick=function(){selSubj=s;renderCats();goStep(2);};
    g.appendChild(b);
  });
})();

function renderCats(){
  var o=document.getElementById('cat-opts');
  o.innerHTML='';
  var cats=DATA[selSubj].categories;
  document.getElementById('bc2').innerHTML=
    '<span class="bc-item">'+DATA[selSubj].icon+' '+selSubj+'</span>'+
    '<span class="bc-sep">›</span>'+
    '<span class="bc-item cur">カテゴリを選択中</span>';
  Object.keys(cats).forEach(function(c){
    var b=document.createElement('button');
    b.className='cat-btn';
    b.innerHTML='<span>'+c+'</span><span class="cat-cnt">'+cats[c].length+'冊</span>';
    b.onclick=function(){selCat=c;renderRes();goStep(3);};
    o.appendChild(b);
  });
}

function renderRes(){
  var books=DATA[selSubj].categories[selCat];
  document.getElementById('res-title').textContent=selCat;
  document.getElementById('res-sub').textContent=selSubj+' · '+books.length+'冊';
  document.getElementById('bc3').innerHTML=
    '<span class="bc-item">'+DATA[selSubj].icon+' '+selSubj+'</span>'+
    '<span class="bc-sep">›</span>'+
    '<span class="bc-item cur">'+selCat+'</span>';
  var g=document.getElementById('books-grid');
  g.innerHTML='';
  books.forEach(function(bk){
    var c=document.createElement('div');
    c.className='book-card';
    var imgHtml=bk.img
      ?'<img class="book-img" src="images/books/'+bk.img+'.jpg" alt="'+bk.title+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="book-img-ph" style="display:none">📗</div>'
      :'<div class="book-img-ph">📗</div>';
    c.innerHTML='<div class="book-img-wrap">'+imgHtml+'</div>'+
      '<div class="book-body">'+
      '<div class="book-cat">'+selCat+'</div>'+
      '<div class="book-title">'+bk.title+'</div>'+
      '<div class="book-review">'+bk.review+'</div>'+
      '</div>';
    g.appendChild(c);
  });
}
</script>
